name: Tự động Build APK Trường Vân Hồ

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Cài đặt Java JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cài đặt Android SDK
      uses: android-actions/setup-android@v3

    - name: Cài đặt Apache Cordova
      run: npm install -g cordova

    - name: Cấu hình Cordova Android
      run: |
        cordova platform add android
        
    - name: Biên dịch ra file APK Debug
      run: cordova build android --debug

    - name: Xuất bản file APK về máy
      uses: actions/upload-artifact@v4
      with:
        name: VanHoMedia-Icon-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
